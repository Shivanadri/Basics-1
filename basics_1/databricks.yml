# This is a Databricks asset bundle definition for basics_1.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: basics_1
  uuid: 989be369-2323-467c-82bc-9e65c6d564c9

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-7405612602865704.4.azuredatabricks.net
    variables:
      catalog: basic_catalog
      schema: dev
  prod:
    mode: production
    workspace:
      host: https://adb-7405612602865704.4.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/rajkumarkakkerla555@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/rajkumarkakkerla555@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: basic_catalog
      schema: prod
    permissions:
      - user_name: rajkumarkakkerla555@gmail.com
        level: CAN_MANAGE
